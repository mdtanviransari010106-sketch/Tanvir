<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✨ Pro Fullscreen Text Editor</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Inter:wght@500;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #35477d 0%, #6c5b7b 100%);
      min-height: 100vh;
    }
    #editor {
      resize: none;
      font-family: 'Fira Code', monospace;
      height: calc(100vh - 80px) !important;
      min-height: 360px;
      /* Stretches the editor below toolbar */
    }
    .glass {
      background: rgba(30,32,44,0.85);
      box-shadow: 0 8px 24px 0 rgba(0,0,0,0.2);
      border-radius: 1.5rem;
      backdrop-filter: blur(8px);
    }
    /* Floating panel animation */
    .fade-in {
      animation: fadeIn 0.3s both;
    }
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(16px);}
      to {opacity: 1; transform: translateY(0);}
    }
    .editor-header {
      font-family: 'Fira Code', monospace;
      letter-spacing: 1px;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-900 via-purple-700 to-pink-700 text-white h-screen w-screen overflow-hidden">

  <!-- Top Toolbar -->
  <header class="glass sticky top-0 z-50 flex items-center justify-between px-8 py-4 shadow-lg editor-header w-full">
    <h1 class="text-2xl font-bold bg-gradient-to-tr from-yellow-400 via-pink-500 to-violet-400 text-transparent bg-clip-text select-none">🧠 Pro Text Editor</h1>
    <div class="flex items-center gap-3">
      <button id="undoBtn" title="Undo (Ctrl+Z)" class="p-2 rounded-lg hover:bg-violet-600 transition">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
          stroke-width="2" stroke="currentColor" class="w-6 h-6 text-yellow-300">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 10h12a6 6 0 016 6v1" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 10l4 4m0-8l-4 4" />
        </svg>
      </button>
      <button id="redoBtn" title="Redo (Ctrl+Y)" class="p-2 rounded-lg hover:bg-violet-600 transition">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
          stroke-width="2" stroke="currentColor" class="w-6 h-6 text-green-300">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 10H9a6 6 0 00-6 6v1" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 10l-4 4m0-8l4 4" />
        </svg>
      </button>
      <button id="saveBtn" title="Save as File" class="p-2 rounded-lg hover:bg-violet-600 transition">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
          stroke-width="2" stroke="currentColor" class="w-6 h-6 text-pink-300">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
        </svg>
      </button>
      <button id="historyBtn" title="Show Edit History" class="p-2 rounded-lg hover:bg-violet-600 transition">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
          stroke-width="2" stroke="currentColor" class="w-6 h-6 text-blue-300">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </button>
    </div>
  </header>

  <!-- Editor Area (always fullscreen below header) -->
  <main class="w-full h-full flex flex-col items-center justify-center">
    <textarea id="editor"
      class="w-full bg-gray-900 bg-opacity-70 text-white p-8 rounded-lg text-lg focus:outline-none focus:ring-2 focus:ring-pink-400 transition-shadow shadow-inner"
      placeholder="Start typing your masterpiece..."></textarea>
  </main>

  <!-- Edit History Panel -->
  <div id="historyPanel" class="hidden glass absolute right-12 bottom-12 z-50 rounded-2xl p-6 w-80 max-h-96 overflow-y-auto fade-in shadow-2xl border-2 border-pink-300">
    <h2 class="text-base font-bold text-yellow-300 mb-2">Edit History</h2>
    <ul id="historyList" class="text-sm text-gray-200 list-disc ml-5"></ul>
  </div>

  <!-- Script Section -->
<script>
  const editor = document.getElementById('editor');
  const undoBtn = document.getElementById('undoBtn');
  const redoBtn = document.getElementById('redoBtn');

  let undoStack = [];   // STACK (LIFO)
  let redoQueue = [];  // QUEUE (FIFO)
  let lastValue = "";

  // --- Detect WORD completion (space / enter) ---
  editor.addEventListener('keyup', (e) => {
    if (e.key === " " || e.key === "Enter") {
      const words = editor.value.trim().split(/\s+/);

      // Add only NEW word
      if (words.length > undoStack.length) {
        undoStack.push(words[words.length - 1]);
        redoQueue = []; // clear redo on new word
      }
    }

    lastValue = editor.value;
  });

  // --- Undo (remove ONE WORD) ---
  undoBtn.addEventListener('click', () => {
    if (undoStack.length > 0) {
      const word = undoStack.pop();
      redoQueue.push(word);
      editor.value = undoStack.join(" ") + (undoStack.length ? " " : "");
    }
  });

  // --- Redo (restore ONE WORD) ---
  redoBtn.addEventListener('click', () => {
    if (redoQueue.length > 0) {
      const word = redoQueue.shift(); // QUEUE
      undoStack.push(word);
      editor.value = undoStack.join(" ") + " ";
    }
  });

  // --- Keyboard Shortcuts ---
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'z') {
      e.preventDefault();
      undoBtn.click();
    }
    if (e.ctrlKey && e.key === 'y') {
      e.preventDefault();
      redoBtn.click();
    }
  });
</script>
</body>
</html>
